server {
    listen 80;
    server_name _;
    resolver 127.0.0.11 ipv6=off valid=30s;

    root /usr/share/nginx/html;
    index index.html;

    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    location /assets/ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /api/ {
        # host.docker.internal приходит через extra_hosts, поэтому nginx должен
        # резолвить его системно при старте, а не через Docker DNS resolver.
        proxy_pass http://host.docker.internal:8001;
        proxy_http_version 1.1;
        # Длинные approval/recalculation запросы не должны обрываться раньше
        # frontend timeout для расчётов.
        proxy_connect_timeout 5s;
        proxy_send_timeout 130s;
        proxy_read_timeout 130s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), bluetooth=(), interest-cohort=()" always;
    add_header Cross-Origin-Opener-Policy same-origin always;
    add_header X-Permitted-Cross-Domain-Policies none always;
    add_header Content-Security-Policy "default-src 'self'; object-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://*.tile.openstreetmap.org; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests" always;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
