services:
  frontend:
    build:
      dockerfile: Dockerfile.prod
      args:
        KORNIX_SESSION_MODE: bff
        KORNIX_API_BASE_URL: /api
        KORNIX_ENABLE_MOCK_API: "false"
        KORNIX_ALLOW_PRIVATE_MOCK_RUNTIME: "false"
    image: kornix-frontend:prod
    restart: unless-stopped
    ports:
      - "${KORNIX_FRONTEND_BIND:-127.0.0.1}:${KORNIX_FRONTEND_PORT:-8080}:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
