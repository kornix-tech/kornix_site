services:
  frontend-dev:
    build:
      context: .
      target: dev
    image: kornix-frontend:dev
    container_name: kornix-frontend-dev
    environment:
      VITE_AUTH_MODE: ${VITE_AUTH_MODE:-mock}
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
      VITE_ENABLE_MOCK_API: ${VITE_ENABLE_MOCK_API:-true}
      VITE_ALLOW_PRIVATE_MOCK_RUNTIME: ${VITE_ALLOW_PRIVATE_MOCK_RUNTIME:-false}
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "${KORNIX_DEV_BIND:-127.0.0.1}:${KORNIX_DEV_PORT:-5173}:5173"
    volumes:
      - .:/app
      - kornix_frontend_node_modules:/app/node_modules
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"]

volumes:
  kornix_frontend_node_modules:
