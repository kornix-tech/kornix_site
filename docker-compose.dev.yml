services:
  frontend-dev:
    build:
      context: .
      target: dev
    image: kornix-frontend:dev
    container_name: kornix-frontend-dev
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
      VITE_KORNIX_CALCULATION_TIMEOUT_MS: ${VITE_KORNIX_CALCULATION_TIMEOUT_MS:-120000}
      KORNIX_DEV_API_PROXY_TARGET: ${KORNIX_DEV_API_PROXY_TARGET:-http://host.docker.internal:8001}
      CHOKIDAR_USEPOLLING: "true"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${KORNIX_DEV_BIND:-127.0.0.1}:${KORNIX_DEV_PORT:-5173}:5173"
    volumes:
      - .:/app
      - kornix_frontend_node_modules:/app/node_modules
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"]

volumes:
  kornix_frontend_node_modules:
