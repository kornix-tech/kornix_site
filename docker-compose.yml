services:
  frontend:
    build:
      context: .
      target: prod
      args:
        KORNIX_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    image: kornix-frontend:local
    container_name: kornix-frontend
    restart: unless-stopped
    ports:
      - "${KORNIX_FRONTEND_BIND:-127.0.0.1}:${KORNIX_FRONTEND_PORT:-8080}:80"
