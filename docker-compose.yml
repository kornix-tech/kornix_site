services:
  frontend:
    build:
      context: .
      target: prod
      args:
        KORNIX_SESSION_MODE: ${VITE_AUTH_MODE:-bff}
        KORNIX_API_BASE_URL: ${VITE_API_BASE_URL:-}
        KORNIX_ENABLE_MOCK_API: ${VITE_ENABLE_MOCK_API:-false}
    image: kornix-frontend:local
    container_name: kornix-frontend
    restart: unless-stopped
    ports:
      - "${KORNIX_FRONTEND_BIND:-127.0.0.1}:${KORNIX_FRONTEND_PORT:-8080}:80"
